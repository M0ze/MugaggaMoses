<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mugagga Moses - Developer Portfolio</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Roboto+Mono:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        /* Base Styles & Dark Mode (Default) */
        :root {
            --bg-color: #0a0a0a;
            --text-color: #00ff9d; /* Green accent */
            --accent-color: #39ff14; /* Brighter green */
            --link-color: #39ff14;
            --prompt-color: #00ff9d;
            --input-text-color: #00ff9d;
            --cursor-color: #00ff9d;
            --secondary-text-color: #cccccc;
            --border-color: #00ff9d;
            --shadow-color: rgba(0, 255, 157, 0.3);
            --scanline-color: rgba(0, 255, 157, 0.08);
            --bezel-border: 30px solid rgba(0,0,0,0.9);
            --bezel-shadow: inset 0 0 50px rgba(0,0,0,0.7);
            --project-card-bg: rgba(0, 10, 0, 0.7);
            --project-card-border: 1px solid rgba(0, 255, 0, 0.3);
            --skill-bar-bg: rgba(0, 50, 0, 0.7);
            --skill-bar-border: 1px solid rgba(0, 255, 0, 0.3);
            --skill-bar-color: #00ff00;
            --skill-bar-shadow: 0 0 10px rgba(0, 255, 0, 0.7);
        }

        /* Bright Mode */
        body.bright-mode {
            --bg-color: #ffffff;
            --text-color: #1a1a1a; /* Dark grey/black */
            --accent-color: #0077cc; /* Modern blue accent */
            --link-color: #0077cc;
            --prompt-color: #000000;
            --input-text-color: #000000;
            --cursor-color: #000000;
            --secondary-text-color: #333333;
            --border-color: #000000;
            --shadow-color: rgba(0, 0, 0, 0.2);
            --scanline-color: rgba(0, 0, 0, 0.08);
            --bezel-border: 30px solid rgba(255,255,255,0.9);
            --bezel-shadow: inset 0 0 50px rgba(255,255,255,0.4);
            --project-card-bg: rgba(230, 230, 230, 0.95);
            --project-card-border: 1px solid rgba(0, 0, 0, 0.3);
            --skill-bar-bg: rgba(200, 200, 200, 0.7);
            --skill-bar-border: 1px solid rgba(0, 0, 0, 0.3);
            --skill-bar-color: #0000ff; /* Blue skill bar */
            --skill-bar-shadow: 0 0 10px rgba(0, 0, 255, 0.7);
        }

        /* General Body & Terminal Styling */
        body {
            font-family: 'VT323', monospace;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden; /* Prevent horizontal scroll */
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        #crt-container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            box-shadow: var(--bezel-shadow);
            border: var(--bezel-border);
            transition: box-shadow 0.3s ease-in-out, border-color 0.3s ease;
        }

        #terminal-window {
            position: relative;
            width: 95%; 
            max-width: 1000px; 
            height: 90%;
            max-height: 700px; 
            border: 2px solid var(--border-color);
            background-color: rgba(0, 15, 0, 0.9); 
            box-shadow: 0 0 20px var(--shadow-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 20px; 
            box-sizing: border-box;
            font-size: 1.1rem; 
            transition: border-color 0.3s ease, background-color 0.3s ease, box-shadow 0.3s ease;
        }
        body.bright-mode #terminal-window {
            border-color: #000000;
            background-color: rgba(240, 240, 240, 0.95);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.2);
        }

        #terminal-output {
            flex-grow: 1;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-word; 
            scrollbar-width: thin;
            scrollbar-color: var(--prompt-color) rgba(0, 15, 0, 0.9);
        }
        #terminal-output::-webkit-scrollbar { width: 0.5em; }
        #terminal-output::-webkit-scrollbar-track { background: rgba(0, 15, 0, 0.9); }
        #terminal-output::-webkit-scrollbar-thumb { background-color: var(--prompt-color); border-radius: 4px; border: 2px solid rgba(0, 15, 0, 0.9); }

        body.bright-mode #terminal-output { scrollbar-color: #000 rgba(240, 240, 240, 0.95); }
        body.dark-mode #terminal-output::-webkit-scrollbar-track { background: rgba(0, 15, 0, 0.9); }
        body.dark-mode #terminal-output::-webkit-scrollbar-thumb { background-color: #00ff00; border-color: rgba(0, 15, 0, 0.9); }
        body.bright-mode #terminal-output::-webkit-scrollbar-track { background: rgba(240, 240, 240, 0.95); }
        body.bright-mode #terminal-output::-webkit-scrollbar-thumb { background-color: #000000; border-color: rgba(240, 240, 240, 0.95); }


        #terminal-input-line { display: none; }
        #prompt-symbol { margin-right: 10px; color: var(--prompt-color); font-weight: bold; }
        #terminal-input {
            flex-grow: 1; background: transparent; border: none; outline: none;
            color: var(--input-text-color); font-family: 'VT323', monospace; font-size: inherit;
            caret-color: var(--cursor-color); caret-shape: block;
            animation: blink 1s step-end infinite alternate;
        }
        @keyframes blink { 50% { opacity: 0; } }

        #scanlines {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(to bottom, transparent, transparent 50%, var(--scanline-color) 50%, var(--scanline-color) 100%);
            background-size: 100% 4px; pointer-events: none; opacity: 0.6; z-index: 10;
            transition: background 0.3s ease-in-out, opacity 0.3s ease-in-out;
        }
        body.bright-mode #scanlines { background: repeating-linear-gradient(to bottom, transparent, transparent 50%, rgba(0,0,0,0.08) 50%, rgba(0,0,0,0.08) 100%); opacity: 0.4; }

        #bezel {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border: 30px solid rgba(255, 255, 255, 0.9); 
            box-shadow: inset 0 0 50px rgba(255,255,255,0.4);
            pointer-events: none; z-index: 15;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }
        body.dark-mode #bezel {
            border: 30px solid rgba(0, 0, 0, 0.9); 
            box-shadow: inset 0 0 50px rgba(0,0,0,0.7);
        }

        .output-line { margin-bottom: 0.6em; line-height: 1.5; }
        .output-highlight { color: var(--accent-color); }
        .output-link {
            color: var(--link-color); text-decoration: none; cursor: pointer;
            border-bottom: 1px dashed var(--link-color);
            transition: color 0.2s ease, border-color 0.2s ease;
        }
        .output-link:hover { color: var(--text-color); border-bottom: 1px solid var(--text-color); }

        .skill-bar-container {
            width: 100%; background-color: var(--skill-bar-bg); border: 1px solid var(--skill-bar-border);
            margin-top: 5px; height: 15px; position: relative; border-radius: 3px;
        }
        .skill-bar {
            height: 100%; background-color: var(--skill-bar-color); 
            transition: width 0.5s ease-out; border-radius: 3px;
        }
        .skill-label { display: block; margin-bottom: 5px; font-weight: bold; }

        .project-card {
            border: var(--project-card-border); background-color: var(--project-card-bg);
            padding: 15px; margin-bottom: 15px; border-radius: 5px;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }
        .project-card h3 { margin-top: 0; color: var(--accent-color); font-weight: bold; }
        .project-card p { font-size: 0.9em; color: var(--secondary-text-color); }
        .project-card a { color: var(--link-color); text-decoration: none; border-bottom: 1px dashed var(--link-color); }

        .timeline { position: relative; }
        .timeline::before { 
            content: ''; position: absolute; left: 50%; top: 0; bottom: 0;
            width: 2px; background-color: var(--border-color); margin-left: -1px;
        }
        .timeline-item { position: relative; padding-bottom: 40px; }
        .timeline-item::after { 
            content: ''; position: absolute; left: 50%; top: 15px; 
            width: 12px; height: 12px; margin-left: -6px; 
            background-color: var(--accent-color); border-radius: 50%;
            border: 2px solid var(--text-color);
        }
        .timeline-content { width: calc(50% - 30px); }
        .timeline-item:nth-child(odd) .timeline-content { left: 0; padding-right: 30px; text-align: right; }
        .timeline-item:nth-child(even) .timeline-content { left: calc(50% + 30px); padding-left: 30px; text-align: left; }

        .contact-form input, .contact-form textarea {
            background-color: rgba(0, 15, 0, 0.8);
            color: #00ff00;
            border: 1px solid rgba(0, 255, 0, 0.3);
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 4px;
            font-family: 'VT323', monospace;
            font-size: inherit;
            width: 100%;
            box-sizing: border-box;
        }
        body.bright-mode .contact-form input, body.bright-mode .contact-form textarea {
            background-color: rgba(230, 230, 230, 0.95);
            color: #000000;
            border-color: rgba(0, 0, 0, 0.3);
        }
        .contact-form button {
            background-color: var(--accent-color);
            color: #000000; 
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'VT323', monospace;
            font-size: inherit;
        }
    </style>
</head>
<body class="dark-mode">
    <div id="crt-container" class="dark-mode">
        <div id="terminal-window">
            <div id="terminal-output"></div>
            <div id="terminal-input-line">
                <span id="prompt-symbol">&gt;</span>
                <input type="text" id="terminal-input" autofocus autocomplete="off" spellcheck="false">
                <span id="cursor">_</span>
            </div>
        </div>
        <div id="scanlines"></div>
        <div id="bezel"></div>
    </div>

    <script>
        const developerName = "Mugagga Moses";
        const developerLocation = "Uganda";
        const developerShortName = "Moses";

        const aboutContent = `
Hi, I'm ${developerShortName}— a creative developer from ${developerLocation} obsessed with making the web feel alive.
I build terminal-style portfolios and work on web experiences. When I'm not coding, I'm exploring new technologies.
`;

        const skillsData = {
            languages: [
                { name: "JavaScript", level: 95 },
                { name: "TypeScript", level: 90 },
                { name: "Python", level: 80 },
                { name: "HTML", level: 98 },
                { name: "CSS", level: 95 },
            ],
            frameworks: [
                { name: "React", level: 85 },
                { name: "Node.js", level: 80 },
                { name: "Express.js", level: 75 },
                { name: "Tailwind CSS", level: 95 },
            ],
            tools: [
                { name: "Git", level: 90 },
                { name: "Docker", level: 70 },
                { name: "VS Code", level: 90 },
                { name: "Vim", level: 99 },
            ]
        };

        const projectsData = [
            { title: "Terminal Portfolio", description: "This very site! A retro-futuristic developer portfolio.", tech: ["HTML", "CSS", "Vanilla JS"], link: "#", github: "#" },
            { title: "Gemini CLI Experiments", description: "AI-powered command-line tools.", tech: ["Node.js", "Python", "AI"], link: "#", github: "#" },
            { title: "3D Portfolio Engine", description: "Reusable Three.js template for 3D portfolio experiences.", tech: ["Three.js", "JavaScript", "GLSL"], link: "#", github: "#" },
            { title: "Personal Blog", description: "A space for sharing thoughts and tutorials.", tech: ["Markdown", "Static Site"], link: "#", github: "#" }
        ];

        const experienceData = [
            { title: "Senior Software Engineer", company: "Tech Innovations Inc.", duration: "2023 - Present", description: "Leading development of advanced web applications." },
            { title: "Full-Stack Developer", company: "Creative Solutions Ltd.", duration: "2021 - 2023", description: "Built and maintained scalable client-facing platforms." },
            { title: "Junior Developer", company: "Startup Hub", duration: "2020 - 2021", description: "Gained foundational experience in web development." },
        ];

        const contactLinks = [
            { name: "GitHub", url: "https://github.com/M0ze", icon: "🐙" },
            { name: "X (Twitter)", url: "https://x.com/MozesMugagga", icon: "❌" }
        ];

        class Terminal {
            constructor(outputEl) {
                this.outputElement = outputEl;
                this.isThemeDark = true;
            }

            init() {
                this.outputElement.innerHTML = ''; 
                this.setTheme('dark-mode');
                
                const sections = ['home', 'about', 'skills', 'projects', 'experience', 'contact'];
                sections.forEach(section => {
                    this.renderSection(section);
                    const separator = document.createElement('div');
                    separator.className = 'output-line my-12 border-b border-dashed opacity-20';
                    this.outputElement.appendChild(separator);
                });
            }

            renderSection(sectionId) {
                let content = '';
                switch(sectionId) {
                    case 'home':
                        content = `<div class="output-line text-4xl mb-2"><strong>${developerName}</strong></div><div class="output-line opacity-80">Full Stack Engineer | Uganda</div>`;
                        break;
                    case 'about':
                        content = `<div class="output-line text-xl text-accent mb-4"><strong>[ ABOUT ]</strong></div><div class="output-line leading-relaxed">${aboutContent}</div>`;
                        break;
                    case 'skills':
                        content = `<div class="output-line text-xl text-accent mb-4"><strong>[ SKILLS ]</strong></div>${this.renderSkills()}`;
                        break;
                    case 'projects':
                        content = `<div class="output-line text-xl text-accent mb-4"><strong>[ PROJECTS ]</strong></div>${this.renderProjects()}`;
                        break;
                    case 'experience':
                        content = `<div class="output-line text-xl text-accent mb-4"><strong>[ EXPERIENCE ]</strong></div>${this.renderExperience()}`;
                        break;
                    case 'contact':
                        content = `<div class="output-line text-xl text-accent mb-4"><strong>[ CONTACT ]</strong></div>${this.renderContact()}`;
                        break;
                }
                const div = document.createElement('div');
                div.innerHTML = content;
                this.outputElement.appendChild(div);
            }

            renderSkills() {
                let html = '';
                Object.keys(skillsData).forEach(cat => {
                    html += `<div class="output-line mt-4"><strong>${cat.toUpperCase()}:</strong></div>`;
                    skillsData[cat].forEach(s => {
                        html += `<div class="output-line">${s.name} <div class="skill-bar-container"><div class="skill-bar" style="width: ${s.level}%"></div></div></div>`;
                    });
                });
                return html;
            }

            renderProjects() {
                return projectsData.map(p => `
                    <div class="project-card">
                        <h3>${p.title}</h3>
                        <p>${p.description}</p>
                        <div class="mt-2">${p.tech.map(t => `<span class="text-xs border border-accent px-1 mr-1">${t}</span>`).join('')}</div>
                        <div class="mt-2"><a href="${p.link}" class="output-link mr-4">Live</a> <a href="${p.github}" class="output-link">Code</a></div>
                    </div>
                `).join('');
            }

            renderExperience() {
                return `<div class="timeline">${experienceData.map(e => `
                    <div class="timeline-item">
                        <div class="timeline-content">
                            <strong>${e.title}</strong><br>${e.company}<br><span class="opacity-60 text-sm">${e.duration}</span>
                            <p class="mt-2 text-sm">${e.description}</p>
                        </div>
                    </div>
                `).join('')}</div>`;
            }

            renderContact() {
                return `
                    <div class="contact-form">
                        <input type="text" placeholder="Name"><br>
                        <input type="email" placeholder="Email"><br>
                        <textarea placeholder="Message" rows="4"></textarea><br>
                        <button>Send</button>
                    </div>
                    <div class="mt-6 flex space-x-6">
                        ${contactLinks.map(l => `<a href="${l.url}" class="output-link">${l.name}</a>`).join('')}
                    </div>
                `;
            }

            setTheme(cls) {
                document.body.className = cls;
                document.getElementById('crt-container').className = cls;
            }

            scrollToBottom() {
                this.outputElement.scrollTop = 0;
            }
        }

        window.addEventListener('load', () => {
            const terminal = new Terminal(document.getElementById('terminal-output'));
            terminal.init();
        });
    </script>
</body>
</html>
