<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mugagga Moses — Developer Portfolio</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Roboto+Mono:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="crt-container" class="dark-mode">
        <div id="terminal-window">
            <div id="terminal-output">
                <!-- Terminal output will be injected here by JavaScript -->
            </div>
            <div id="terminal-input-line">
                <span id="prompt-symbol">&gt;</span>
                <input type="text" id="terminal-input" autofocus autocomplete="off" spellcheck="false">
                <span id="cursor">_</span>
            </div>
        </div>
        <div id="scanlines"></div>
        <div id="bezel"></div>
    </div>

    <script src="js/content.js"></script>
    <script src="js/terminal.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
